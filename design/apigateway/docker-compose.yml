services:
  fastapi:
    image: fraud-detector:latest
    container_name: fastapi_service
    networks:
      - kong-net

  kong:
    image: kong:3.6
    container_name: kong_gateway
    env_file:
      - .env.kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: info
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "8000:8000"   # proxy
      - "8001:8001"   # admin API
    depends_on:
      - fastapi
      - redis
    networks:
      - kong-net

  redis:
    image: redis:7
    container_name: redis
    networks:
      - kong-net
networks:
  kong-net:
    driver: bridge